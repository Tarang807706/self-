
<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
    body{
font-family:'Poppins',sans-serif;
}

h1{
font-family:'Pacifico',cursive;
font-size:55px;
color:white;
text-shadow:0 0 20px #ff4081;
}

#message{
font-family:'Poppins',sans-serif;
font-size:28px;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.page{
display:none;
height:100vh;
padding-top:120px;
}

.active{
display:block;
}

h1{
color:white;
font-size:50px;
text-shadow:0 0 20px #ff4081;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4081,#ff9800);
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(0,0,0,0.3);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff4081;
}

/* balloons */

.balloons{
position:fixed;
bottom:-200px;
width:100%;
display:flex;
justify-content:space-around;
}

.balloon{
width:70px;
height:90px;
border-radius:50%;
animation:float 7s infinite;
}

.balloon:nth-child(1){background:red}
.balloon:nth-child(2){background:blue;animation-duration:6s}
.balloon:nth-child(3){background:yellow;animation-duration:8s}
.balloon:nth-child(4){background:green;animation-duration:7s}
.balloon:nth-child(5){background:pink;animation-duration:9s}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-1000px)}
}

/* cake bounce */

.cake{
font-size:90px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-20px)}
}

/* teddy walk */

.teddy{
width:120px;
position:absolute;
bottom:20px;
left:-150px;
animation:walk 12s linear infinite;
}

@keyframes walk{
0%{left:-150px}
100%{left:100%}
}

/* gift box */

.gift{
font-size:80px;
cursor:pointer;
animation:shake 1s infinite alternate;
}

@keyframes shake{
from{transform:rotate(-5deg)}
to{transform:rotate(5deg)}
}

/* message */

#message{
font-size:26px;
color:rgb(12, 11, 11);
width:70%;
margin:auto;
line-height:40px;
}

/* confetti */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* hearts */

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
.gift-box{
position:relative;
width:120px;
height:120px;
margin:auto;
cursor:pointer;
transform-style:preserve-3d;
perspective:600px;
}

.box{
width:120px;
height:80px;
background:bisque;
position:absolute;
bottom:0;
border-radius:10px;
}

.lid{
width:120px;
height:40px;
background:#ff9800;
position:absolute;
top:0;
border-radius:10px;
transition:transform 1s;
transform-origin:bottom;
}

/* Open animation */

.open .lid{
transform:rotateX(-120deg);
}
#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
.finalMsg{
font-size:28px;
color:white;
width:70%;
margin:auto;
line-height:40px;
}

.bigCake{
font-size:120px;
animation:bounce 1s infinite alternate;
}
</style>
</head>

<body>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>🎂 Birthday Surprise 🎂</h1>

<input type="text" id="name" placeholder="Enter Name">

<br><br>

<button onclick="start()">Start Surprise 🎉</button>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="balloons">
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
</div>

<h1 id="wish"></h1>

<div class="cake">🎂</div>
<div class="gift-box" onclick="openGift()">
<div class="lid"></div>
<div class="box"></div>
</div>

<br>

<div class="gift" onclick="nextPage()">🎁</div>

<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="teddy">

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>💖 Special Message 💖</h1>

<p id="message"></p>

<br>

<button onclick="celebrate()">Celebrate 🎊</button>

<canvas id="confetti"></canvas>

</div>
<!--page4-->

<div class="page" id="page4">

<h1>🎊 Surprise For You 🎊</h1>

<p class="finalMsg">
You are the most amazing person.  
May your life be filled with happiness and success.  
Happy Birthday once again 💖
</p>

<div class="bigCake">🎂</div>

</div>


<script>

let name="";

function start(){

name=document.getElementById("name").value;

if(name==""){
alert("Enter name first");
return;
}

document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

document.getElementById("wish").innerHTML=
"🎉wishing you a very Happiest Birthday🎂🎉💕 "+name+" 🎉";

document.getElementById("music").play();

}

function nextPage(){

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

typeMessage();

}

function typeMessage(){

let text="Soniji, rupwati, don,tharki dost😂😎😜 urffff "+name+" 🌹👀💖, may your birthday be filled with happiness, laughter and unforgettable memories. May every dream you wish for come true. Keep shining and smiling always. Today is your special day — enjoy every moment of it! 🎂✨";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

}

/* confetti */

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

for(let i=0;i<200;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+2,
color:"hsl("+Math.random()*360+",100%,50%)"
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<confetti.length;i++){

let c=confetti[i];

ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,c.r,c.r);

c.y+=3;

if(c.y>canvas.height){
c.y=0;
}

}

}

function celebrate(){

setInterval(draw,20);
startHearts();

}

function startHearts(){

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);

},300);

}
function openGift(){

let gift=document.querySelector(".gift-box");

gift.classList.add("open");

setTimeout(()=>{
nextPage();
},1200);
const fwCanvas = document.getElementById("fireworks");
const fwCtx = fwCanvas.getContext("2d");

fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;

let particles = [];

function createFirework(){

for(let i=0;i<100;i++){

particles.push({

x:fwCanvas.width/2,
y:fwCanvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
size:Math.random()*3+2,
color:"hsl("+Math.random()*360+",100%,50%)"

});

}

}


function celebrate(){

setInterval(draw,20); // confetti start

setTimeout(showFinalPage,5000); // 5 sec baad next page

}

}




function showFinalPage(){

document.getElementById("page3").classList.remove("active");

document.getElementById("page4").classList.add("active");

}



</script>

</body>
</html>
